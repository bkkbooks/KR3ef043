  - {type: 'tls:div-start', offset: 5047, content: '', id: KR3ef043_jc_001-d3d7, level: 2, head_text: 晚發是傷寒正病}
  - {type: 'tls:head', offset: 5047, content: '', id: KR3ef043_jc_001-d3.d7.h1s1}
