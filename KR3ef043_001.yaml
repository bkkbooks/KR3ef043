  - {type: 'tls:div-start', offset: 3735, content: '', id: KR3ef043_jc_001-d3d6, level: 2, head_text: 即病伏氣直中傳經四證異同}
  - {type: 'tls:head', offset: 3735, content: '', id: KR3ef043_jc_001-d3.d6.h1s1}
