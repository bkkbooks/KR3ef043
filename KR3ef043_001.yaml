body:
  text: 卷上傷寒論難讀並宜補大旨醫惟實事弗尚空談仲景書所以傳世不朽者以其言皆實事百家莫及也然缺略難讀尤在敘證太簡常與方藥不相對近賢多以方釋證惟成氏能先證後藥亦未能大暢厥旨非成氏拙於注釋實仲景之文有難釋者也前人謂初學必先讀傷寒論以立根本豫獨謂不然當先讀內經難經接讀金匱參以外臺千金而後及傷寒論以考其變即如每節首署太陽病云云有直指發熱惡寒項背強痛者有謂先見太陽病今又接見下文諸證者有謂本是太陽病今忽轉見下文諸證者果有日久及發汗吐下後等語猶有轉接之迹可尋無之便苦上下不貫矣況夫邪氣之何以發為太陽病少陽陽明三陰病也三陽三陰病之何以各見某證也發汗吐下後之何以變見某證也某證之何以應用某方加減某藥也一概不曾道破間有一二亦斷碎而不續此雖智者不能得其脈絡之所在而責之初學不亦難乎王叔和作傷寒例僅提其綱陶節庵作六書與全生集未竟其緒深望世有高賢取仲景書合之內經參之諸家補發其所未備三陽三陰病上補發邪氣來路病下補發轉證機括某方主之上下補發對治氣宜切定實事勿談空理初中末候條理分明使讀者對書如對病人焉確有可循不致眩惑斯生靈之幸也小子愚陋愧不及此僅發其端以待來者三陽三陰分經名義經也者分野之謂也猶孟子所謂經界在人身謂之部位無專物而命物者也部位既定於是筋與脈之行於太陽少陰之部者命曰太陽之筋太陽之脈少陰之筋少陰之脈行於陽明太陰之部者命曰陽明之筋陽明之脈太陰之筋太陰之脈行於少陽厥陰之部者命曰少陽之筋少陽之脈厥陰之筋厥陰之脈故靈樞經脈經筋兩篇並冠以經者以筋之與脈皆分經而行非筋脈之外別有所為經也大者為經支者為絡以脈之大者各據專部故得獨被以經之名非以經絡相對屹然二物也然則三陰三陽果本於何義而有此名也曰本於天地四象也陰陽離合論曰聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明厥陰之表名曰少陽太陰之後名曰少陰少陰之前名曰厥陰由此觀之前曰陽明者陽者表也明者盛也耳目之精手足之用皆聚於前故曰陽明其里太陰人身背為陽腹為陰居腹之裡故曰至陰後曰太陽者太者至也陽者表也居背之表而又為耳目手足之所不及在人身為至遠故曰太陽遠之也其里少陰少者小也居背之裡稍近於前故曰少陰兩側曰少陽者分據兩側部位狹隘故曰少陽其里厥陰厥者逆也前後之交兩氣相觸故也是故陰陽者表裡之雅名太少厥陰者前後兩側之雅名耳三陽經之氣血亦運行於三陰三陰經之氣血亦運行於三陽不得以表裡分經之陰陽為氣血本性之陰陽也氣血之陰陽當各從其臟腑之本體求之與分經之陰陽兩不相涉者也故至真要大論曰以名命氣以氣命處而言其病謂以四象陰陽之名命於六氣以六氣陰陽之名命於人身上下表里之處處即經之義也蓋天下無無名之物也必分立諸名而後便於討論病機焉言者討論之謂也由是推之命燥金曰陽明濕土曰太陰特假其名而已非燥金之氣屬陽濕土之氣屬陰而居前也命寒水曰太陽君火曰少陰亦假其名而已非寒水屬陽君火屬陰而居後也命相火曰少陽風木曰厥陰亦假其名而已非相火屬陽風木屬陰而居兩側也總之三陰三陽分經只是人身分野之空名非如筋脈之有專物也邪在分野是為腠理是為表病故無論三陰三陽當其邪在分野見證只在軀殼之外必其邪入經脈見證乃及臟腑之中其有未入經脈遽見里證者是邪氣直中三焦也三焦者里之分野也三陰三陽者外之分野也分野者衛之部也經脈者營之道也此義諸家發明不一而足西醫解剖見無所為六經者便誚中醫誕妄而不自知其疏陋也略看醫書小本便肆狂吠中國士子且然於西醫乎何責易曰聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象至哉言乎聖人通於天地萬象之本無不可以陰陽者也如高下之升降浮沉也前後之向背表裡也往來之順逆也清濁寒熱也牝牡雌雄也凡屬對待之象皆可命以陰陽之名豈特分經而已哉即心肺為陽肝腎為陰脾胃六腑為至陰亦陽清陰濁之一端耳清者多靜而居里濁者多動而居表故又有陽濁陰清之説若不開拓心胸洞見本原而欲執一義以印萬象亦安往而不窒乎萬象可通於一義而不能拘於一義者也有體之陰陽有性之陰陽有氣之陰陽有象之陰陽有數之陰陽有部位之陰陽有功用之陰陽有角立之陰陽有相生之陰陽有交變雜錯之陰陽故曰陰陽者數之可十推之可百引之可千推之可萬然其要一也知其要者一言而終不知其要流散無窮傷寒重病多是下焦伏寒傷寒中有一種極顯極要之義仲景未曾道破後人暗中摸索全未道著只有傷寒偏死下虛人一語是從已敗之後歸咎於病人自己之不慎而不知其治法之差用藥之誤也夫冬傷於寒者大率傷於下焦膝脛也若傷於頭面肩背是陽氣刻刻升越之道未有不立見惡寒發熱者早傷暮病夕傷朝病一汗即邪散而解且有不汗而自解者烏有深入於裡而為六經傳變種種幻證者乎其所以傳變者正為邪伏於下與陽氣不相沖激得以宴然久據侵淫於裡久而上越過膝入腹陽氣不得安窟乃始發病或再加以上焦新感則其發愈暴治此者必選溫散藥中之沉降下行者或溫散而佐以沉降之品導之下行使邪氣之自下而上者仍退返於下而出焉則邪氣下退元氣歸窟而身安矣所謂沉降下行之品者威靈仙獨活吳萸沉香牛膝澤瀉之屬是也若專以麻桂發其上上焦得汗則上焦元氣愈空下焦邪氣愈因之而上移是非逐邪也直驅正以引邪耳故前人以邪氣由太陽下行入少陰為深入吾正以邪氣由太陽少陰上行入陽明太陰為深入也凡發汗後腹脹滿及水藥不得入口者是不僅中焦濕邪為汗所動而下焦寒邪上越與中焦之濕邪相搏也發汗或吐或下後心下逆滿氣上衝胸及眩悸瞤振者是不僅上焦之清陽經絡之津液為汗所擾而下焦寒邪上越百脈之氣血舉為其所逆亂不得循經也下後脈促胸滿及胸滿煩驚不得小便譫語身重不可轉側者是上脘藥力與下焦寒邪兩寒相搏陽氣遏於中焦而不得舒也辨脈篇中脈浮而大醫反下之又飲冷水水寒相得其人即䭇事正類此即所謂太陽隨經瘀熱在裡以致蓄血發黃亦是寒邪上爭血脈不得下行之故總因麻桂只能發上焦之表汗不能搜下焦之伏寒而傷寒為病率是邪伏下焦日久鬱極有觸乃發不在上焦陽氣出入之沖道是以藥力不能與之相值反虛上焦正氣為邪氣闢升騰猖獗之路又何怪乎橫肆傳變不可方物哉或曰太陽病初起項背強痛非上焦病乎此時未聞膝脛有所苦也曰項背強痛正以下焦邪氣上衝而擎之與新感相搏而然是時兩髀以下必痠脹疼痛異常矣安得謂無苦果無苦也不過尋常感冒而已何待古今諸賢費如許心力故治傷寒起手必察下焦元氣之虛實寒熱虛而寒者是真陽不足即所謂下虛也溫搜兼補之虛而熱者是燥火也溫搜兼潤化之實而寒者重溫搜之實而熱者是邪在外絡而內藏瘀熱也溫搜而兼清化之藥力達於病所使邪從何道而入者仍從何道而出而上焦新感之風寒即溫搜之藥自能隨帶而解散之此外如病人脾肺素弱上焦表濕膠固中焦痰水凝結或溫熱久蘊於中焦或虛火常衝於頭面皆可隨證加藥且明斯義也凡傷寒而兼腳氣兼疝氣兼痞塊兼飲癖兼心胃氣痛者舉可賅而治之不犯手矣即有血塊及脫血症亦可加行血藥以合治之而不犯上焦矣縱橫揮灑無不如志何至變證蜂起觸處棘手哉每見冬月傷寒者至雨水驚蟄後或暴嘔吐或暴厄逆或暴喘促或暴瀉泄或暴眩暈心懸或兩腿無力數武即喘或二便猝閉又忽大下無端煩躁夜不安眠或上熱下冷煩躁氣喘半夜後又兩足轉熱如焚此皆遍身筋骨痠痛兩髀以下尤甚第身雖發熱而往來無定不似表證世遂以為雜病未有知是冬寒下伏者若加以上焦新感重見惡寒發熱又專以為表證專以麻桂發之轉見氣浮作喘兩腿胕腫元氣不根矣更有夏暑內伏交冬寒邪自下上衝而始發病者其證胸中煩熱如破皮狀兩足徹冷如冰及夜轉熱如焚此寒暑相搏三焦之血絡瘀痹也益無有知其病情者伏寒觸發與傷寒時溫脈證並病機異同久寒下伏有因新感風寒而觸發有因春月時陽上升而觸發有因飲食勞倦而觸發新感觸發外證與傷寒相似而不同者上焦傷寒惡寒發熱遍身筋絡拘急疼痛而頭項為甚脈象沉緊而數呼吸稍促而不甚粗常欲仰臥展布四體伏寒雖已發熱心常凜凜畏寒筋骨諸節痠𤺊脹痛而兩髀以下膝脛為甚脈象浮弦而大重按反小起伏應指戰栗呼吸喘粗身熱足冷胸雖煩躁而兩足常欲蜷曲不能伸展時陽與飲食勞倦觸發外證與冬溫春溫相似而不同者時溫大熱氣粗久撫肌里灼手脈象洪緩而數來疾去遲舌苔滿黃渴欲冷飲時時欲嘔筋骨微脹而不痛神識不清不待胸滿即不思食伏寒微熱動即氣喘寒熱往來久撫肌里不熱或反冷如冰脈象洪緩而遲其來不盛而去甚疾沉候與尺後反緊舌苔前黃後白表黃里白渴不欲飲或欲熱飲少腹氣衝暴大嘔吐筋骨疼脹神識清明食稍減而易飢以上皆初起見證也血氣尚未濁亂邪正尚未混淆是傷寒溫病與伏寒之最要關頭入手辨症不差施治不誤刻期可已過此失治變證蜂湧高下相引表裡相攻斑疹隱見而痰嗽頻仍口爛齦蝕而臍痛腹瀉寒熱之真假難明虛實之淺深莫辨心慌手亂顧此失彼鮮不敗者舊説辨傷寒溫病有曰溫病從里傷寒從表又曰溫病分三焦傷寒分六經豫更續之曰傷寒重證自下而上溫病重證自上而下傷寒死證自上而下溫病死證自下而上傷寒在下而不上輕證也在上而不下輕之輕也溫病在上而不下輕證也在下而不上輕重之間未可知也夫溫病發於伏氣者由口鼻吸受伏於膈上膜原侵淫三焦血分其即病者亦由口鼻散布肺胃消灼津液血分濁惡也傷寒發於伏氣者由足脛浸受伏於筋絡骨節侵淫肌膜氣分其即病者乃由腠理布於上焦閉遏陽氣氣分搏激也傷寒伏氣變為溫病者非寒能化溫也其人本體氣血多熱寒伏於下陽氣不得下通三焦菀熱日積月盛及至發病只見三焦熱證不見下焦寒象且有清利上熱自能借逐下寒者故雖有髀脛痠𤺊脹痛諸證前人往往皆強屬於溫而不敢議其為寒也若下寒太盛上熱不及借逐者當俟熱勢半減後加藥分治之須得內經病所遠而中道氣味之者食而過之之義否則溫去寒存上嘔下利中焦隔塞有合偏死下虛人之説矣其實非下虛也乃下寒而失治耳即病伏氣直中傳經四證異同伏氣即病直中傳經之説聚訟紛紜全在文字上計校不在實事上指陳或曰中而即病為傷寒久伏化熱為溫病或曰三陽在表三陰在裡邪氣何能飛度而直中三陰或曰傷寒卒病以寒邪傷人最為毒厲也三時感冒不必傳經即傳經亦不似傷寒之急夫中而即病即感冒之類也伏氣有淺深之別或伏寒於冬至春夏而發病或伏寒於前月至後月而發病皆謂之伏氣皆有化熱不化熱之辨何得一言伏氣便專屬於溫病與傷寒截然無涉況三時溫涼濕熱腠理疏豁傳經反遲冬寒腠理密緻裡氣充實傳經反急理不可通遂歸咎於邪氣之毒厲更造為越經傳錯經傳諸説以回護之此皆所謂遁詞中有所蔽故也蓋嘗思之仲景論中明明有六經中風之文豈風能直中寒反不能直中耶中而即病者其機有二一傷於上焦正當陽氣衝道朝傷夕病夕傷朝病其證先惡寒而後發熱謂之太陽病惡寒發熱一時齊發所謂發熱惡寒者發於陽也陽指上焦遷延失治為諸變幻謂之傳經此前人所已言也一傷於下焦不當陽氣衝道其證或微惡寒而不發熱或微發熱而甚惡寒或寒熱往來無定此時尚無大熱所謂無熱惡寒者發於陰也陰指下焦二三日不解邪氣乘太陽經氣上入項背乃大發熱至此乃大發熱故有或已發熱或未發熱之辨而成正太陽病矣亦有入少陽而為寒熱煩躁亦有入陽明而為便祕譫語亦有直入三陰太陽見證獨重謂之太陽病各經見證獨重謂之直中遷延失治為諸變幻謂之傳經太陽病有傳經直中三陰亦有傳經也故三陽亦有里證三陰亦有表證此前人言之而未詳者也伏氣發病者其機亦有二一為觸發一為晚發詳見前後篇文大抵邪氣偏伏下焦肌肉之分附著筋骨血脈之外不與陽氣相值故往往必待有大氣以觸之而後發病其機甚厲可表可里化寒化熱全視體氣強弱為之轉移或隨太陽經氣上行項背而為太陽表證或直衝膀胱小腸而為太陽里證其證小便猝閉而氣喘轉為胕腫發黃或直入少腹命門而為少陰證或衝過少陰旁溢血脈血脈逆亂而為厥陰證此二者所謂偏死下虛人也其證下利四逆蜷曲自溫氣上撞心兩肋堅脹轉為口爛蝕齦自汗不止臍築湫痛五液注下或厥陰氣血強壯不肯受邪邪氣外行而為少陽證血脈細絡燥嗇故其脈弦細其證寒熱往來轉為癮疹或循少腹之前表上行胸胃之膜絡而為陽明證或循少腹之前里上行膈膜之分野而為太陰證如此者邪氣雖行經分實與臟腑相近籓籬盡撤聽其所之正氣失權傳變最速此又前人言之而未詳者也仲景論中專敘足六經見證其手六經見證皆屬裡病者正以伏氣先發於足必待上行入里而後及於手經也又太陽傳陽明少陽皆屬熱證三陰皆屬寒證者正以邪氣外行於表即里陽內菀而為熱直攻於裡即里陽下泄而為寒也若如上焦傷寒必待傳陽已遍而後入陰則陽明少陽早已化熱三陰之菀熱當更甚矣何反忽轉為寒也又太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈舊注以邪氣傳遍六經為經盡後有斥之以為行其經盡非傳經也邪氣之行於本經者盡也似矣然七日之義無著殊不知此謂諸經不受病耳如太陽病頭痛次日行陽明而陽明不受又次日行少陽而少陽不受又次日行太陰少陰厥陰而三陰不受始終止於頭痛邪淺易散故自愈作再經者邪重不得散菀熱欲轉病故針足陽明使經不傳以泄菀氣也是太陽病中傳變之一端未可以為傷寒傳經之總例此等緊要關節向來俱未覷破總緣於病所從來之路與其所轉化之機未能悉心近取遠譬確見實際故但能各執經文之一語以相攻擊而不能切合病家之情形以徵適用也不適用三字本於嘉善俞氏知言哉知言哉晚發是傷寒正病晚發緩發也與即病相對待又與觸發相對待專邪自發不感外氣本是傷寒中之正病成注謂後來之疾也語意不明他家更以傷寒雜證釋之殊不知此乃下焦伏寒日久化濕留連淫溢以漸上行故病之來勢甚緩停蓄於中至六七日結為水氣與即病惡寒發熱之表證不同又不似觸發者之暴急也自脈陰陽俱緊口中氣出唇口乾燥蜷臥足冷以下皆晚發見證不知者分作兩截專以若脈遲至六七日不欲食屬之晚發是泥於此為晚發之句不知此乃從六七日後追思而通括之只作一讀連下成句晚發二字是現成語氣猶言此因晚發以致水停故也六七日句與上文七日以來句八日以上句平列皆晚發轉證一寒盛而陽氣爭之一寒濕兩盛陽氣不能自持一寒去而濕存也只因此為晚發句倒裝於此遂致眩惑若提在勿妄治也前便自曉然大抵此病寒邪久伏菀為夾濕濕性濡滯故其勢甚緩其脈甚遲其證寒多熱少神昏肢耎遷延日久有誤作虛證而用補者豫曾診治見讀醫隨筆寒濕下受直傷少陰變證多端搜治匪易篇中又有汗病篇亦晚發之病也當參觀之茲不贅録夫前言脈陰陽俱緊者寒盛也此言脈遲者寒勢稍衰而濕盛也按晚發只訓緩發寒中夾濕以病勢之緩立名非以發時之遲取義冬月伏寒發於春夏固為晚發上月伏寒發於下月亦為晚發事所常有不必怪説不但本章是晚發即前自脈浮而遲後至病六七日手足三部脈皆至章亦皆是晚發之類清邪中上濁邪中下章是邪入血分榮衛不通初起似可麻黃升麻湯主之本章是邪在氣分上熱下寒三轉證中以吐利為最危脈浮而遲章是濕搏於表中氣不足口噤躁擾章是濕結膻中熱搏於裡即汗病篇所説是也兩感有三兩感有三有陰陽兩感有臟腑兩感有寒溫兩感陰陽兩感者陰陽兩經並感於寒毒也素問靈樞所説兩感並是此義此有故寒先伏於下焦新寒復中於上焦上下兩邪相引故邪由陰道而上衝新邪由陽道而內入亦有同時並感者必由薄衣露處及冒寒遠行勞力汗出邪氣乘虛而入此時邪氣直是漫天蓋地而來何暇輾轉傳經由淺漸進又何暇陰陽勻配範我馳驅哉故太陽少陰兩病未必不兼見陽明太陰證陽明太陰兩病未必不兼見少陽厥陰證然邪氣究須有從入之先道細審機括亦自有孰正孰兼孰重孰輕之辨臟腑兩感者外經與臟腑同感於寒毒非傳腑傳臟之謂也此或由飲食傷於腸胃或由呼吸入於膻中故小兒當風飲食當風啼哭極宜慎之外既感受風寒而又內寒上衝於肺下侵於腎於是惡寒發熱筋骨強痛之中又有咳嗽嘔吐瀉泄腹痛之苦仲景先救其里後攻其表是緩治也急者溫中發表並用風擾於中其勢極惡霍亂轉筋非桂不足以制之寒溫兩感者寒溫兩毒相伏非傷寒化溫溫病轉寒之謂也外邪所傷謂之毒內氣所化不得謂之毒即不得謂之兩感傷寒有初起即見寒死證無初起即見熱死證其有熱死者日久失治也否則先有溫邪內伏也溫病有初起即見熱死證無初起即見寒死證其有寒死者日久失治也否則先有寒邪下伏也常有秋月久晴燥邪由呼吸伏於膻中霜降以後天氣乍寒腠理開豁邪氣乘之其證寒熱強痛而初起即神識昏迷譫語氣粗口渴索水又有夏月伏暑為秋涼所遏不得發越入冬感寒而發病者其證胸中煩熱如破皮狀兩足如冰入夜轉熱如焚煩躁不能安眠此暑毒在血之故又有冬月寒伏下焦入春感於風溫而發病者其證初起上見喘粗聲如甕中漸見面目胕腫神識昏迷反胃乾嘔也大法先治其溫後治其寒與真寒假熱真熱假寒諸治法不同水氣凌心即是三焦傷傷寒雜病皆有之史載之論水氣凌心證治甚詳讀醫隨筆已備録之近年曆驗似於病機稍有確見史載之敘疫痢水氣凌心者初起寒甚大熱不退心中凜凜時時嘔惡治以肉桂白芷細辛茯苓諸品此水氣凌心證治之樞要也巢氏病源候論言噤黃隱黃初起心中寒栗口噤齒介神識冥漠不知東西殺人甚速此水氣凌心之急證也又近見瘧疾有寒起於少腹不復轉熱而死者腳氣有氣起於少腹上衝急喘而死者此皆水氣凌心之類大抵此病病機有輕重緩急之別而皆由於真陽不足如前所言噤黃腳氣者是命門真火不足膀胱陰邪暴漲上攻於心也其證氣高目努口噤肢戰其脈尺中動搖如豆若遇寒月一經四肢作冷即苦心寒凜栗或遇感冒一經惡寒發熱即苦心氣迫塞者是陽明衝任血虛血中蓄水膻中陽微不堪寒氣侵逼也其脈左寸動搖或右寸鼓搏又有肺氣與少陽經氣為風寒所襲脈絡乍閉仆倒不省者此肝腎陽明大氣為邪所攝也下焦無病上焦不虛大氣得轉即復省矣其脈兩寸丸丸或乍見短縮大凡病中覺冷氣侵心如受霜雪及心懸心悸情緒孤危張惶失措者皆陽明不足膻中虛寒也氣喘及左寸脈或短或斷者邪已逼心也尺脈斷者邪發下焦也不短不斷而來勢鬱勃不揚如物制之者外邪內撲也並宜開上納下法如菖蒲遠志細辛白芷附子肉桂桃仁半夏茯苓鹿角龜版紫石英之屬選用之前文久成因推求所以脈見丸丸不續之故忽憶辨脈篇形冷惡寒三焦傷之義正與此合此節是倒卷文例陽動則汗出陽已透陰所謂陽加於陰謂之汗又脈盛而滑者汗且出也陰動則發熱陽欲透陰能與陰爭而不肯服也至於身形作冷心情惡寒膻中凜凜如受霜雪侵逼狀是陽氣欲熄而不振矣古説皆以三焦為命門上屬於心主三焦傷者命門元陽之氣為寒水所犯而其根不固心主血脈之氣為寒水所犯而其氣不續氣為寒傷血為水傷故脈來指下丸丸動搖不能長續也其動必應指少力與金匱動則為驚弱則為悸相近弱字承動説下謂動而弱也諸氣衝心皆為惡證寒水凌犯尤惡以其能撲滅生陽之氣也或膀胱水邪自下上逆或風寒由呼吸挾水飲而亂於膻中其勢能令命火上浮心火下熄任督二脈分絶而不交史載之謂寒邪所傷雖治愈亦不能久其謂此乎西醫謂凡以霍亂絞腸痧死者剖視內膜白皺如久受水浸狀此由涼風遏暑汗閉不得出之故亦水邪泛溢三焦受傷之一徵也又有兩證與水氣凌心相似一為火鬱一為風痰入絡總歸於血虛火鬱者內經所謂諸禁鼓栗如喪神守皆屬於火是也此證急發者為風寒內撲陽氣乍郁即水氣凌心之類常發者是血虛而氣不能宣陽氣久郁化為陰火一經觸發即內灼於心心孔鼻竅如煙熏火燎刻不可堪也風痰者是體弱血少或久患脫血血去水存菀為痰涎侵於膜絡絡無血護遂淫淫內癢習習應心心氣張惶不能自持矣此血虛化風生痰肺困氣滯而膜絡乏力也其脈象遲耎兼見洪長而細審帶弦按之反細其病情觸物皆畏遇事難任怯弱迫塞之苦直同心痿遠甚心悸其病機日落時及天陰與乍涼為甚其兼證常苦筋骨脹痛走注無定其始多起於暑月貪涼太過及秋月患瘧痢癍疹汗出不徹之故治法以補血導氣行水強筋為主隨四時加減佐以導引針灸調其飲食起居需以歲月僅堪末減罕能除根古百合病近似之而百合困肺絶不可用豫身患之又迭見親友患之甚矣風痰入絡之奇苦而難治也無端暴喘即是寒入命門傷寒雜病皆有之無寒熱他病飲食如常忽然大喘有行動即喘靜臥稍減者有行動稍可不能正臥者此二大病也皆寒濕冷痰注入命門之故前證由於冬月伏寒或多年久濕自膝脛上衝少腹過膀胱而入肺亦有外循太陽經上行脊背而入肺者必先見咳嗽邪氣自下上逆元氣浮動不能歸窟故動甚也後證由於冷痰發於陽明循衝任而下溜必先見兩乳間隱隱不舒之兆或發於脊背循腰腎而下溜必先有兩腰內隱隱痠脹之兆冷痰有形自上下撲元氣遏抑正臥則膻中氣愈不續故臥甚也治法前證宜仿寒濕腳氣疝氣奔豚法逐邪下出兼咳者兼仿小青龍法輕劑飯後微開其上後證宜生鹿角紫石英肉桂澤瀉直搗命門佐生附子石菖蒲以溫陽明衝任狗脊獨活刀豆以溫腰脊古方如赤丸大建中湯大烏頭煎黑錫丹破陰丹半硫丸三石寒食散皆良方也待痰開喘定再視轉證而隨調之曾診謝婦患前證其脈兩寸短縮關後洪弦隱指動搖如戰栗狀以法治之畏藥峻不肯服逾月而逝時在於春又診楊某患後症其脈左關陷而不起兩尺厥厥動搖斷而不續以法治之三劑喘定脈起且續矣卻嫌太盛戒曰宜靜養而以斂陽安陰之藥調之勿懈也奔走酒食如故又止藥半月喘復發自服麻杏石甘湯而逝時在於秋楊自命精醫者也豫為言病勢甚險根甚深機甚微將來邪氣出路或在二便或在於肺幸發於秋尚可從容調治若發於春神丹不及也楊頗謂然且𥘗示背有痰瘤大如覆碗數十年今忽消以徵冷痰下溜之妙識也而竟中途易轍天命乎人事乎又程某因冶遊宵征忽於夜半後冷氣自臍上衝心慌氣浮腦頂高搖自汗不止勢如欲脫以生附子肉桂子胡蘆巴桑螵蛸加山萸牛膝一劑定連十劑已又楊某因先患熱病重用茯苓澤瀉而愈遂畏溫藥如鴆砒一日胸痹氣窒上下不續呼吸抬肩勢欲作喘豫曰非沉香肉桂不可勉強服之一劑定四五劑已此非自病但因藥誤故挽回較易也又按暴喘與前篇水氣凌心證若勢急藥力不及施勢重藥力不能制須灸膻中關元並灸肩井缺盆大椎極效關元在臍下三寸以名中食三指橫度取之又嘗治風濕入絡氣痹似喘分上下前後灸法厥功甚偉附録於此凡脊背氣下引不能升提甚至尾間兩臀墜脹者灸肓門胃倉兼灸章門肓門當腰外兩旁各三寸所季肋骨上縫中胃倉又在其上一肋骨縫中也胸前氣下陷不能升提甚至臍腹墜脹者灸關元及臍旁肓俞及章門或兼灸乳下兩旁食竇胸背繞肩上氣壅塞呼吸不舒者灸肩井大椎缺盆亦或兼灸食竇及膈俞也若鼓脹作喘者灸上諸穴外並灸水分天樞水道及挾尻上兩旁也每灸諸穴後皆兼灸肩井各二三壯以防火氣上衝
