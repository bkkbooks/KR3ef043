body:
  text: 敘傷寒病因也非病證也以因為名求本也傷寒見證變化無端非仲景六經主證所能賅括後人拘執凡不在仲景文內者概不敢求之傷寒間有窺見一隙又不敢顯違衆論但曲為之説曰是傷寒雜證也夫傷寒之證自雜安得復有傷寒雜證者也晉唐諸賢以溫病熱病本於傷寒之轉變而別以溫毒與寒毒相對待至哉言乎溫病熱病且以為本於傷寒況其本寒證者乎學者能知傷寒見證不止仲景原文仲景文外尚有傷寒證治庶乎其可與讀傷寒之論治傷寒之病矣乎王叔和作傷寒例以明即病為傷寒伏氣變為溫熱之事用意甚盛惜其語焉不詳揆之事例仍多未備學海讀內經後讀仲景書參以臨診覺於傷寒偏死下虛人一語稍有領會於是有見輒録積久成帙雖無深義要是拾遺發覆之一端名曰傷寒補例不敢補仲景也補叔和云爾乙巳孟冬健之記
