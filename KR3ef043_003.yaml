body:
  text: 卷下傷寒論讀法十四條傷寒非奇病也傷寒論非奇書也仲景據其所見筆之於書非既有此書而天下之人依書而病也其三陰三陽轉變之處前人往往詞涉硬派一似暗有鬼物指使邪氣如何傳法並不得如何傳法讀者須消去此等臆見每讀一段即設一病者於此以揣其病機治法而後借證於書不得專在文字上安排第一須辨傷寒為何等病此本四時皆有之病也但三時多有挾溫挾濕挾燥挾風之異其氣不專於寒其膚腠疏鬆初傷即兼二三經再傳而六經已遍惟冬時腠理固密寒邪必先傷皮膚以漸深入故謂三時傷寒治法不同則可謂三時無傷寒則不可仲景是專論冬時傷寒惟即病於冬與遲病於春中多相間錯出未曾分析其遲病於春者亦系專指寒病未及化熱者與內經冬傷於寒春必病溫之旨不同第二須辨論中寒熱二字為何等氣寒者天地之邪氣也熱者人身之正氣也為寒邪所束不得宣發鬱結而成與寒邪是兩氣非寒能化熱也與溫熱病傷於天地之熱邪者不同寒邪既散即當陽氣伸而熱解其有不解者正氣久困經脈凝滯不能自運抑或誤治使然第三須將傳字看得活非邪氣有腳能自初中轉變步伐止齊也病證變見何象即為邪傷何經如少陽主行津液津液灼干即少陽證陽明主運渣滓渣滓燥結即陽明證讀者須思何以頭痛嘔吐暈眩脅脹何以大便祕結潮熱自汗不得渾之曰邪入少陽故爾也邪入陽明故爾也當在氣化上推求不得專在部位上拘泥第四須辨初傷有三陽有兩感有直中太陽行身之後而主表其時陽明少陽決無不傷內經曰中於項則下太陽中於面則下陽明中於頰則下少陽中於陽則溜於經中於陰則溜於腑即仲景所敘太陽中風鼻鳴乾嘔豈專太陽但邪在大表治法不外麻桂葛根故不必多立名色兩感直中皆因其人陽氣之虛或邪氣之猛也太陽少陰陽明太陰皆有兩感少陽厥陰兩感殊少直中亦然少厥兩感即陽氣蔑矣直中與兩感不同者兩感是一陰一陽同病其邪相等直中是邪甚於陰也其陽一斷無不傷但陰分之病較兩感為急第五須識傷營傷衛不能判然兩途仲景風則傷衛寒則傷營只略敘於麻黃證中不過分析風寒所傷之偏重如此其意側重在寒是串説非平説況夫中風脈緩自汗汗即營也營液外泄桂枝湯是充助營氣之劑傷寒脈緊無汗是衛氣為寒所拘麻黃輕迅是過營透衛以開表其力正注於衛何得謂風傷衛不傷營寒傷營不傷衛更何得以此劈分兩大綱按冬月腠理閉密寒邪以漸而深初傷皮膚只在氣分此時發之不必得汗其邪自散次傷肌肉乃在津液邪與汗俱汗出邪退次傷經脈乃入血分既入經脈則或竄筋骨或潰三焦而據臟腑亦有已及筋骨而仍未入經脈之中者故三陰亦有表證可汗也既入經脈必連臟腑非可專恃汗法矣其未入經脈時所稱太陽病陽明病少陽病及三陰病者只是三陽三陰之部非經也第六須辨寒熱傳化之機初傷固總是寒日久有寒邪內陷者是其人本內寒也有寒去熱不解者是其人陰不足也寒邪內陷必下利即所謂陰傳太陰也其實即陽明之下陷耳繼即少陽之氣陷繼即少陰之氣陷至厥陰肝氣亦陷無復生機矣始終總不離乎下利若利早止於厥陰未陷之前即不得死止於厥陰已陷之後息高時冒陰氣竭矣熱氣不解必祕結必自汗即所謂陽傳陽明也此時太陰之津液必已虧矣治之失法而少陰之精又虧厥陰之血又虧始終總不離乎祕結非邪至陽明即無復傳也總不離乎陽明耳第七須識傷寒溫病始異終同之説不可執也此只説得熱傳陽明一邊其寒傳太陰迥乎不同傷寒有寒死證無熱死證陽明內實非死證也其有死者皆由誤治若溫熱病則有自然一成不變之熱死證第八須識合病並病之中有真假之不同前人分別合病並病語多牽強當是兩陽同感謂之合病由此連彼謂之並病更有邪氣未及彼經而彼經為之擾動者其見證必有虛實之不同如素胃寒者一傷於寒即口淡即便滑素陰虛者一傷於寒熱氣內菀即喘喝即口渴豈真邪傳陽明太陰耶但散其寒諸證即瘳亦有略須兼顧者必其內虛之甚預杜邪氣內陷之路也第九須求寒熱氣化之真際六經傳次本不必依仲景篇次也無如前人越經傳表裡傳等語説得過泥並未靠定各經切發其所以然如少陽主經脈之津液經脈灼干即見少陽證太陰主腸胃之津液腸胃灼干即見太陰證陽明主腸胃之渣滓渣滓燥結即見陽明證厥陰主津膜之津液筋膜枯索即見厥陰證少陰主下焦之氣化津液津竭氣散即見少陰證此從熱化也從寒化者陽氣不足而下泄寒水淫溢而上逆總是何臟受傷即何經見證第十寒化熱化各視本體之陰陽虛實此語淺而極真論中誤汗後有為內寒者有為內熱者誤下後亦有內寒者有內熱者若執過汗亡陽過下亡陰之例便不可通故讀者以隨文生義為貴夫六經乘虛而傳寒熱隨偏而化也第十一須知表裡之説有形層之表裡有經絡之表裡有臟腑之表裡有氣化之表裡形層即前所謂皮膚肌肉筋骨所謂部分也邪在三陰之部里而仍表仍宜汗解邪入三陽之經表而已里只有清化即和解也少陽半表半裡亦有數解以部位言則外在經絡而內連三焦也以氣化言則表寒未清而裡熱已盛也總是氣化燥結之象第十二須知手經足經並無分別足經部位大邪氣在表尚在經脈之外其氣是一大片故見足經證邪入經脈之中反多見手經證矣大抵足經證見者多在軀殼之外手經證見者多關臟腑之中足證有在經者手證絶少在經也經者身形之事也臟腑者神明氣化之事也第十三須知三陰三陽只是經絡表裡之雅名於臟腑氣血之陰陽不相涉也若謂邪入三陽即為傷陽邪入三陰即為傷陰則差矣內經心為太陽肝為少陽肺為少陰腎為太陰脾與六腑為至陰此以氣血清濁言之今人已不講其實各經各臟各腑之中各有陰陽此説甚長細讀內經自能辨之第十四讀書須知闕疑論中敘證有極簡者有極繁者有方證不合者有上下文義不貫者一經設身處境實在難以遵行安知非錯簡脫簡耶不必枉費心機以俟將來之閲歷即如少陽陽明合病自下利者黃芩湯太陽誤下利不止者此協熱利也承氣湯此必內有伏熱三焦腸胃穢氣鬱濁頗似溫病之發於伏邪者於傷寒自利及誤下而利者殊不合格又太陽誤下結胸正宜兼開兼降以宣內陷之陽而開邪氣之結乃反用甘遂巴豆以重泄之是以一誤為不足而又益之也又太陽陽明合病自利者葛根湯不下利但嘔者葛根湯加半夏既不下利何以仍用原方是原方只治合病並非治下利也前文何必特署下利字樣此類宜詳思之前人只説三陽合病皆有下利絶不説合病所以下利之故此之謂半截學問總之讀傷寒論只當涵泳白文注家無慮數十以豫所見二十餘種皆不免穿鑿附會言似新奇莫能見之行事鄙見只當分作四層曰傷寒初起本證治法曰傷寒初起兼證治法曰傷寒日久化寒並誤治化寒證治曰傷寒日久化熱並誤治化熱證治其霍亂風濕食復勞復以雜證附之再參之陶節庵書及各家論溫熱書互相考證庶於讀書有條理而臨診亦可有徑途矣蓋經脈部位與夫形層表裡淺深之事固不可不講而究不可過執也著力仍在氣化上此書在唐以前已非一本其章節離合本無深意讀者只應各就本文思量不必牽扯上下文積久自能融會貫通南北傷寒溫病異治傷寒溫病南北證治其大綱有不同者北方天地之氣化皆燥人身呼吸腠理之間皆燥化也燥之為政清泠而堅削故其治常宜兼滋血而舒筋南方天地之氣化皆濕人身呼吸腠理之間皆濕化也濕之為政渾濁而壅滯故其治常宜兼清血而堅筋又南人乍北多患瘧痢北人乍南多患傷寒溫熱所以然者腠理水濕之邪為天氣所斂不得熏蒸發泄透入血脈氣困血滯則為瘧氣陷血潰則為痢下焦久伏之寒為地氣所沖升騰上越或盈溢於三焦或散布於脈絡寒盛而中焦無熱即為下寒觸發之傷寒中焦積熱同時沖發即為寒溫相伏之溫病凡如此者雖有新感表證俱不宜重用發汗瘧痢並和血行氣以化濕傷寒溫降而微清之溫熱先清而後溫降之或曰子嘗論瘧痢皆宜透汗今乃謂雖有新感不宜重汗何也曰南方瘧痢皆是夏伏暑濕交秋髮病其時濕熱熏蒸腠理疏豁若不振衛陽以御表邪邪氣浸灌來源不斷病何由愈若至北方氣燥肌斂邪氣來源已斷故只宜從里化不得逆其氣以虛其表暗損真元豈竟不汗哉不得辛溫重劑強汗耳傷寒溫熱何如曰此必有大汗然亦非發散之謂也溫之清之微散以導之待時自作若迫而汗之氣行而邪不能從汗出而熱不得退致成壞病誰之咎乎大凡壞病率由治上遺下治氣遺血故也附治瘧宜破血發汗瘧者風涼暑濕之邪伏於血脈之中而作也涼濕為尤重先傷於暑濕復傷於風涼迫濕深入故邪氣既外據筋絡骨節之一處而其內入者又隨血脈以上下此血與筋骨受病之一處相觸即發病矣血行有常度故其發有定時漸早者陽氣漸盛血行漸速也漸宴者濕勝氣困血行漸遲也病之輕重在邪氣之微甚正氣之強弱不在部位之淺深高下焉逐日為輕間日三日為重之説不足據也治法必重以破血之品散惡血以搜伏邪使邪氣無容藏之地加發汗之品使通身上下透汗以托邪外出雖濕徹衾褥不忌也第其汗宜多而不宜急急者下咽即汗逆亂正氣反不能與邪相值必下午及臨臥連次服藥俟藥力絪縕百脈半夜後接服一次以助其力依舊熟睡於睡態朦朧之中溱溱周浹濕散暑消百脈得鬯汗自漸減撤衾換衣衣宜稍厚仍令手足常溫微汗續續直過前日發病之時而不斷也則愈矣傷寒論所謂先其時發汗是也夷堅志曰暑毒困脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥甘草作湯服之安樂困脾者困血也連腳故汗必過膝也每仿其法應手輒效又吾鄉俗以生鹿血酒服截瘧奇效此固山深水寒體氣所宜熱盛者未可概施亦可見瘧邪在血治瘧之必溫通血脈也附治痢宜和營衛養筋膜王損庵論治痢必和營衛其義甚精喻嘉言逆流挽舟之法即從此脫化蓋痢疾或由生冷內傷胃絡血痹或由風濕外束暑鬱血亂無論赤白皆濕熱搏結於血分而筋膜之力弛氣化之行滯也濕盛則血滯而氣困熱盛則膜腫而血溢以破血之品疏營而邪氣無伏藏之地以發汗之品宣衛而邪氣有宣泄之路表裡之脈絡既通其痢宜止而有不止者三焦筋膜之力久為濕熱熏蒸胕腫弛緩不能自束故為涎為血時時淫溢自下而不固也以酸苦之味堅斂之乃能收功內經謂下利身大熱者死陳修園謂兼外感者先發之史載之謂疫痢水邪犯心惡寒發熱者難治用細辛白芷肉桂附子皆和營衛之類也凡痢止而飲食不復者濕熱未清也飲食如常大便作墜者腸腫未消血絡痹也腫痹之久流為休息休息之久轉為腸痿休息者血絡不淨膜力不復也噤口者濕熱太盛胃脘血痹而腫也腸膜微痿酸苦堅之某老醫治痢後脫肛以白芍四錢為君即上若腸體全痿氣不能貫右尺中沉之分應指丸丸耎弱無力內經所謂按之如丸泥大腸氣豫不足也大便脫血及血痢重久者有之男婦傷寒溫病舌黑異治男婦氣血異體證治亦有大端不同者男子氣壯血不易瘀舌黑耳聾血絡痹也為熱入血室舌卷囊縮血痹之甚筋失養也亦有未及化熱兩肋血絡先痹者其證舌苔忽黃忽白必帶灰黑小便忽閉忽通煩躁不能安眠或有一邊不良於眠其脈忽長忽短忽洪忽緊全無定象必得明醫善攻其血乃可治之未有瘀不化黑不退而病能愈者也若婦人血盛常有經水適來適斷與病相觸肝胃之絡最易停瘀舌黑譫語事所常有但耳不聾乳不縮不為敗證即耳微聾而譫妄狂躁者亦邪正相搏之象惟聲息低微不能轉側乃在所忌其舌或藍或灰或黑有僅在一偏有全體皆透均不得據為凶候故治婦科傷寒溫病起手即宜兼和血以防之否則病愈而絡瘀不淨積為胃痛腰疼痼疾又世以黑而芒刺為熱濕潤為寒然瘀血舌黑雖熱而不生芒刺有煙癮人雖寒而亦見燥裂在察其兼證以別之蓋男子之血必因寒而瘀因熱而瘀因溫病過服寒劑遏熱閉絡而瘀女子不必因寒因熱邪與血不必相入而血能自瘀故病愈而黑不退者有之附讀傷寒論雜記四篇傳經必始太陽終厥陰者太陽主氣厥陰主血也邪氣初傷必在於氣漸深必及於血血脈者臟腑之道路也邪既入血遂聽其入腑入臟而不可御矣治之必以行血活絡使血絡松活邪乃易消養津強膜使津膜相養正氣乃固否則血死氣散水停筋弛臟腑之腠理系絡漸見腫硬無噓吸之氣以相循環無伸縮之力以自兜裹而肩助引痛不能轉側一邊不能眠唇面青黑胕腫氣喘小澀大滑臍築湫痛五液注下諸敗證見矣故少陰一經雖多死證而偏屬於寒猶可溫化厥陰死證寒熱夾雜不清無從著手由是言之太陽病只是表之氣分病不必拘於膀胱小腸經也厥陰病只是里之血分病不必拘於肝與心主經也推之陽明太陰少陽少陰莫不皆然故曰當在氣化上講求勿在部位上拘泥上傳經始太陽終厥陰解傷於寒毒為傷寒傷於溫毒為溫病與傷寒傳化之溫病治法大異而小同溫毒起手須用涼散接手即宜苦寒以化之鹹寒以潤之甘寒以補之而收功焉甚有迭用苦寒如吳又可所謂俟熱邪復淤到胃再三下之者傷寒轉化之溫乃正氣所化是無根之邪不宜重用驅逐不但無須涼散即苦寒亦不宜早用更不宜迭用故有下不厭遲之説王叔和傷寒例剖析界限極明後人反從而斥之何也至於瘟疫別是天地一種乖戾之氣或偏於濕或偏於燥或偏於寒不專屬熱也初起即在血分血分濁惡甚於溫病末候與溫病為別派如慎柔五書辨虛損癆瘵之例相似虛損無蟲而瘵有蟲溫熱無蟲而疫有蟲一常氣一奇氣也惟其奇也故豬瘟不死雞雞瘟不死牛其傷人也或專殺貴逸或專殺勞賤或專殺強壯或專殺幼稚有不可以常理喻者溫病重症與瘟疫輕症往往相似即癍疹軟腳大頭粗頸溫病亦間有此症大抵溫病必由漸而成氣候專屬於熱瘟疫一起即見氣候寒熱燥濕並有之又有瘴毒溪毒與瘟疫異源同派疫有寒有熱多偏於燥瘴亦有寒有熱而多偏於濕一發於天氣一發於地氣也上寒溫疫瘴解辨脈篇脈浮而大醫反下之更飲冷水其人即䭇此節是仲景作論本旨族人誤死於傷寒者誤以治溫法治之也寒水相搏胃氣愈促能無厄乎曾診龔某正與此合二月先忽大吐喉傷礙食以為火也用涼劑遂發寒熱以為春溫也加重之遂作厄三日邀診脈來弦長挺互應指戰栗沉分尺中尤甚厄聲頻仍氣從臍下直上撞心曰此下焦伏寒乘時陽而上越為涼藥所抑而作厄耳三日內當轉關否則再七日可危以生附子肉桂子細辛吳萸羌活獨活胡蘆巴破故紙加澤瀉牛膝導之囑令停溫急服三日復診其父喜迎於門口厄大減矣小便鬯矣筋骨痛減能自起坐矣及入診見面色枯黃唇舌燥萎脈來耎長無神搖擺尤甚驚曰得毋改方乎乃言小兒體弱尊方力大前日頭煎分三次服每次皆厄止熟睡兩時夜得微汗昨日某醫來以尊方一劑已足改用平補視之則大劑參耆歸術加薑汁膽汁也我避中焦急趨下焦彼補中焦升提下焦況術尤動氣所忌病人自室中大喊曰自服彼方小便復閉胸滿氣急難受也此時若肯重服黑錫丹破陰丹或可希冀勉照前方加竹茹知母與之應期見鬼而逝上妄下變厄平脈之平讀若駢猶辨也關猶部也寸關尺三部謂之三關動脈見於關上無頭尾者謂形圓如豆分見於各關之上而不能通長有頭尾也微脈名又不甚也以句中有無而字別之若或也發汗若下之又此以曾經發汗若吐若下若亡血坐猶因也但坐汗出不徹故也如陌上篇歸來怨新婦但坐觀羅敷又無因而突然也以手把刃坐作瘡也如鮑照蕪城賦孤蓬自振驚沙坐飛反脈名來微去大故名反又金匱來近去遠故曰反又不應也脈浮而大醫反下之又復也少陰病始得之反發熱脈沉者謂既始得之復有發熱表證也太陽病項背強𠘧𠘧反汗出惡風者謂既項背𠘧𠘧復汗出惡風也又卻也語助詞其數先微脈反但浮謂其脈先微後數卻始終只在於浮也又脈濡而弱弱反在關濡反在巔上字訓正誤牢脈病機牢脈為氣血交困寒濕深固之極象當脈證初起之時未見困憊人每忽之而不知其機之甚危勢之甚急也凡寒之所在則脈弦今堅大搏擊見於極沉裡寒可知然病人往往不自覺其內寒而反苦內熱者以此寒不在臟腑而在陰絡也陰絡者筋骨之間內膜之部也胸肋骨縫之中隱隱拘急而不適俯仰搖扭之際隱隱牽絆而不和因此軀殼之表裡隔塞不得交通表氣散於表不得交於里故四肢乏力皮膚微腫搔之如有所隔自腰以上流汗不止裡氣結於裡泄於裡不得通於表故胸膈支滿稍動即喘大便溏祕無定此皆風濕內襲浸淫日深大率由於先經勞力汗出當風受邪繼又勞力汗出邪氣欲出未盡續又受邪如此更迭反復以致邪氣跋前疐後不得入於裡亦不得閉於表而獨留滯於夾縫之筋膜故此脈此證多見於沖冒風露寢處卑濕勞心勞力表裡交瘁之人仲景辨脈篇寸口脈陰陽俱緊清邪中下濁邪中下一節前後敘證全是榮衛隔絶氣困血滯無一不與牢脈主病相合治法當深明陰陽開合之樞先以行氣化血舒筋活絡為主始見聲如甕中鼻流清涕狀如傷風是陽氣內振也繼見寒熱忽作狀如瘧疾是陽氣外達也繼見寐中多汗清涼似水是邪氣漸出也繼見大便滑墜微似痢疾是內膜溫舒結痰下注也急以強筋固氣之劑調之蓋先撑筋膜之邪氣於表而後收臟腑之正氣於裡迭為君臣需以歲月乃克有濟若遷延日久百脈已痹病勢已急其能待乎寒熱互攻氣血交敗未有甚於此脈此證者仲景所謂臍築湫痛下如汗泥即失治而筋弛血潰者也發汗別法別法非通法也我獨用之聊記以備一格焉豫脾肺氣弱久困濕邪平時常苦體重氣短而脈遲及患感冒如傷寒瘧疾之類即心氣迫塞難堪急用防風浮萍二活威靈仙水葒子苦杏仁牛膝甚者加麻黃川芎炒白芷因有便血證不敢犯細辛桂枝又加炒白芥子石菖蒲焦山楂以開痰桃仁茜草以和血貫衆老鸛草以化濕慮中氣之不充也酌加山藥龍骨薺苨菟絲子以助脾肺慮元氣之不固也又加桑螵蛸冬蟲夏草龜版以安下元邪氣漸退即加牡蠣鱉甲以和肝而防虛陽上越屢試輒效且無病後虛弱久待調理之患又嘗治木匠某感冒發熱依常力作不休數日困極求診呼吸喘促臘稿無汗身熱如焚久撫反涼六脈浮散僅在皮毛不分起伏一息不知十幾至也若以正汗法發之必汗出而氣脫破故紙益智仁並鹽水炒菟絲子淮山藥巴戟天狗脊牛膝木瓜山萸肉加羌防麻辛一劑天明得汗脈息勻調矣汗漏不止以附子桂枝湯與之遂愈此勞力傷寒重證也帶病力作勞傷筋骨元氣外越不能歸窟故不僅助脾肺而必注意肝腎大凡汗出不徹以致邪浮正結相搏於皮毛之間必先斂之而後發之何者陰陽開合之機必先一吸而後能一噓也此中微妙全在會心
